<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>CheckStock</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body{
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      margin:0;
      padding:16px;
      background:#f5f5f5;
    }
    h2{margin-bottom:10px;}
    input{
      width:100%;
      padding:14px;
      font-size:18px;
      border-radius:10px;
      border:1px solid #ccc;
      margin-bottom:12px;
    }
    .card{
      background:#fff;
      padding:14px;
      border-radius:12px;
      margin-bottom:10px;
    }
    .job{font-weight:bold;}
    .location{
      font-size:22px;
      font-weight:bold;
      color:#1a73e8;
      margin:6px 0;
    }
    .actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }
    .btn{
      padding:10px 12px;
      font-size:16px;
      border-radius:8px;
      border:none;
      text-decoration:none;
      cursor:pointer;
    }
    .btn.dark{background:#333;color:#fff;}
    .btn.blue{background:#1a73e8;color:#fff;}
  </style>
</head>

<body>

<h2>ค้นหางาน</h2>

<input id="search" placeholder="พิมพ์รหัส / ชื่องาน / โลเคชั่น เช่น A2-20">

<div id="result"></div>

<script>
const SHEET_ID = "17dwMvTFAu48MdQ8FwKRDJGAQuAEwpQNmoggzD8OqGJA";
const SHEET_NAME = "Sheet1";

const CSV_URL =
  `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${SHEET_NAME}`;

let data = [];

fetch(CSV_URL)
  .then(r => r.text())
  .then(text => {
    const rows = text.split("\n").slice(1);
    data = rows.map(r => {
      const c = r.split(",");
      return {
        code: (c[0]||"").trim(),
        job: (c[1]||"").trim(),
        location: (c[2]||"").trim()
      };
    });
  });

document.getElementById("search").addEventListener("input", e => {
  const q = e.target.value.toLowerCase().trim();
  const list = data.filter(d =>
    d.code.toLowerCase().includes(q) ||
    d.job.toLowerCase().includes(q) ||
    d.location.toLowerCase().includes(q)
  );
  render(list);
});

function render(list){
  const el = document.getElementById("result");
  el.innerHTML = "";
  list.forEach(d => {
    const mapUrl = `maps/${d.location}.jpg`;
    el.innerHTML += `
      <div class="card">
        <div class="job">${d.job}</div>
        <div class="location">${d.location}</div>
        <div>รหัสลูกค้า: ${d.code}</div>
        <div class="actions">
          <a class="btn blue" href="${mapUrl}" target="_blank">🗺 เปิดแผนที่</a>
        </div>
      </div>
    `;
  });
}
</script>

</body>
</html>
